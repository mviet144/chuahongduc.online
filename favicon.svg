<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#E8D48B"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="#6B1D0E"/>
  <g fill="url(#g)">
    <!-- Center petal -->
    <ellipse cx="32" cy="24" rx="6" ry="14" opacity="0.95"/>
    <!-- Left petals -->
    <ellipse cx="32" cy="24" rx="6" ry="14" transform="rotate(-30 32 32)" opacity="0.85"/>
    <ellipse cx="32" cy="24" rx="6" ry="14" transform="rotate(-60 32 32)" opacity="0.7"/>
    <!-- Right petals -->
    <ellipse cx="32" cy="24" rx="6" ry="14" transform="rotate(30 32 32)" opacity="0.85"/>
    <ellipse cx="32" cy="24" rx="6" ry="14" transform="rotate(60 32 32)" opacity="0.7"/>
    <!-- Base -->
    <ellipse cx="32" cy="44" rx="10" ry="4" opacity="0.5"/>
  </g>
</svg>
